# Change prefix to Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Kill pane without confirm
bind x kill-pane

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# 256 colors
set -g default-terminal "screen-256color"

# Reduce escape delay
set -sg escape-time 10

# ── Status bar ───────────────────────────────────────────────────────────────
# Requires a Nerd Font / Powerline-patched font for arrows () and icons
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Palette:  #0f1a0f darkest · #1a2a1a dark · #2e4a2e mid-dark
#           #3d5c3a mid · #5a8c50 accent · #7aaa60 bright · #c8e6a0 text

set -g status-style "bg=#1a2a1a fg=#8aaa70"

# Left: [ session ] › [ cwd ]
set -g status-left-length 60
set -g status-left "\
#[bg=#5a8c50 fg=#0f1a0f bold]  #S \
#[bg=#2e4a2e fg=#5a8c50]\
#[bg=#2e4a2e fg=#a8c08a]  #{b:pane_current_path} \
#[bg=#1a2a1a fg=#2e4a2e] "

# Window tabs — inactive subtle, active with powerline arrows
setw -g window-status-separator ""
setw -g window-status-style         "bg=#1a2a1a"
setw -g window-status-current-style "bg=#3d5c3a fg=#c8e6a0 bold"
setw -g window-status-format         " #[fg=#4a6e40]#I#[fg=#5a7a50]:#[fg=#7aaa60]#W "
setw -g window-status-current-format "\
#[bg=#1a2a1a fg=#3d5c3a]\
#[bg=#3d5c3a fg=#c8e6a0 bold] #I:#W \
#[bg=#1a2a1a fg=#3d5c3a]"

# Right: [ git branch ] › [ date ] › [ time ]
set -g status-right-length 120
set -g status-right "\
#[bg=#1a2a1a fg=#2e4a2e]\
#[bg=#2e4a2e fg=#8aaa70]\
 #(cd #{pane_current_path} && git symbolic-ref --short HEAD 2>/dev/null) \
#[bg=#3d5c3a fg=#2e4a2e]\
#[bg=#3d5c3a fg=#c8e6a0]  %a %d %b \
#[bg=#5a8c50 fg=#3d5c3a]\
#[bg=#5a8c50 fg=#0f1a0f bold]  %H:%M "

# Pane borders
set -g pane-border-style        "fg=#2a3d2a"
set -g pane-active-border-style "fg=#5a8c50"

# Message / command prompt style
set -g message-style "bg=#3d5c3a fg=#c8e6a0 bold"
