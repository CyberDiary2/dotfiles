backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'xfce4-panel'"
];

# Transparency
inactive-opacity = 0.9;
active-opacity = 1.0;
frame-opacity = 0.9;
inactive-opacity-override = false;
focus-exclude = [
    "class_g = 'firefox'",
    "class_g = 'Chromium'"
];

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'xfce4-panel'",
    "window_type = 'dock'"
];

# Fading
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
